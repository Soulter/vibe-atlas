name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            build_script: dist:mac
            artifact_name: vibe-atlas-macos
          - os: windows-latest
            label: Windows
            build_script: dist:win
            artifact_name: vibe-atlas-windows
          - os: ubuntu-latest
            label: Linux
            build_script: dist:linux
            artifact_name: vibe-atlas-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag $TAG is not a valid semver release tag"
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Tag $TAG does not match package.json version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Build release assets
        run: npm run ${{ matrix.build_script }} -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*
            !release/*-unpacked
            !release/*-unpacked/**
            !release/builder-debug.yml
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
