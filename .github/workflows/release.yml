name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            build_script: dist:mac
          - os: windows-latest
            label: Windows
            build_script: dist:win
          - os: ubuntu-latest
            label: Linux
            build_script: dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag $TAG is not a valid semver release tag"
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG" != "v$PACKAGE_VERSION" ]]; then
            echo "Tag $TAG does not match package.json version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Build and publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.build_script }} -- --publish always
